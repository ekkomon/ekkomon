name: generate animation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake SVGs
        # Substitua esta etapa pela sua etapa real que gera os SVGs, se necessário
        uses: Platane/snk-svg-action@v1
        with:
          github_user_name: ${{ github.repository_owner }}
          output_path: dist/github-contribution-grid-snake.svg
          output_dark_path: dist/github-contribution-grid-snake-dark.svg

      - name: Replace purple with orange in generated SVGs
        run: |
          sed -i 's/#8e44ad/#FF8C00/g' dist/*.svg || true
          sed -i 's/#9b59b6/#FF8C00/g' dist/*.svg || true
          sed -i 's/purple/#FF8C00/gi' dist/*.svg || true

      - name: Push generated files to `output` branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
